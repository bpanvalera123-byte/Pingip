name: Build Windows EXE

on:
  push:
    tags:
      - 'v*' # Срабатывает при создании тега версии, например v1.0.0
  workflow_dispatch: # Позволяет запускать сборку вручную через сайт GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Чтение репозитория
      uses: actions/checkout@v4

    - name: Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Сборка в EXE через PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "C:/Users/runneradmin/AppData/Local/Programs/Python/Python311/Lib/site-packages/customtkinter;customtkinter/" app.py

    - name: Архивация готового приложения
      run: |
        Compress-Archive -Path dist/app/* -DestinationPath PingMonitor-Windows.zip

    - name: Публикация в GitHub Releases
      uses: softprops/action-gh-release@v1
      with:
        files: PingMonitor-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
