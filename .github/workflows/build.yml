name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Чтение репозитория
      uses: actions/checkout@v4

    - name: Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Сборка EXE через PyInstaller
      shell: pwsh
      run: |
        $ctkPath = (python -c "import customtkinter, os; print(os.path.dirname(customtkinter.__file__))").Trim()
        pyinstaller --noconfirm --onedir --windowed --add-data "${ctkPath};customtkinter/" app.py

    - name: Архивация готового приложения
      shell: pwsh
      run: |
        Compress-Archive -Path dist/app/* -DestinationPath PingMonitor-Windows.zip

    - name: Публикация в GitHub Releases
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: PingMonitor-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Сохранение артефакта (при ручном запуске)
      uses: actions/upload-artifact@v4
      with:
        name: PingMonitor-Executable
        path: PingMonitor-Windows.zip
